<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>ASL Detection</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body{

            margin:0;
            padding:0;

            background:#0f172a;

            color:white;

            overflow:hidden;

            font-family:Arial,sans-serif;
        }

        .main-wrapper{

            height:100vh;

            display:flex;

            flex-direction:column;

            padding:15px;
        }

        .top-section{

            flex:1;

            display:flex;

            gap:20px;

            min-height:0;
        }

        .camera-section{

            flex:1.4;

            background:#111827;

            border-radius:20px;

            overflow:hidden;

            border:3px solid #7c3aed;

            display:flex;

            align-items:center;

            justify-content:center;
        }

        video{

            width:100%;
            height:100%;
            object-fit:cover;
        }

        .sign-section{

            flex:1;

            background:#111827;

            border-radius:20px;

            border:3px solid #2563eb;

            display:flex;

            align-items:center;

            justify-content:center;

            overflow:hidden;
        }

        .sign-section img{

            width:100%;
            height:100%;
            object-fit:contain;
        }

        .bottom-section{

            margin-top:15px;

            background:#111827;

            border-radius:20px;

            padding:20px;
        }

        .title{

            font-size:2rem;

            font-weight:bold;

            margin-bottom:15px;

            text-align:center;

            color:#38bdf8;
        }

        .letter{

            font-size:2rem;

            font-weight:bold;

            color:#4ade80;
        }

        .word{

            font-size:1.8rem;

            font-weight:bold;

            color:#facc15;
        }

        .controls{

            margin-top:15px;
        }

        .controls button{

            margin:5px;

            border-radius:12px;

            padding:10px 18px;

            font-weight:bold;
        }

        @media(max-width:900px){

            body{
                overflow:auto;
            }

            .main-wrapper{
                height:auto;
            }

            .top-section{

                flex-direction:column;
            }

            .camera-section{
                height:45vh;
            }

            .sign-section{
                height:35vh;
            }

            .letter{
                font-size:1.4rem;
            }

            .word{
                font-size:1.3rem;
            }

            .controls button{
                width:100%;
            }
        }

    </style>

</head>

<body>

    <div class="main-wrapper">

        <div class="title">
            🖐 American Sign Language Detection
        </div>

        <div class="top-section">

            <div class="camera-section">

                <video
                    id="video"
                    autoplay
                    playsinline
                    muted
                ></video>

            </div>

            <div class="sign-section">

                <img
                    src="{{ url_for('static', filename='Images/Sign.jpg') }}"
                    alt="Signs"
                >

            </div>

        </div>

        <div class="bottom-section text-center">

            <div class="letter">

                Current Letter :
                <span id="currentLetter">
                    Waiting...
                </span>

            </div>

            <div class="word mt-3">

                Word :
                <span id="displayWord">
                   No letters detected yet.
                </span>

            </div>

            <div class="instruction-box mt-2">
                <p><strong>Instructions:</strong></p>
                <p>👋 Show your hand to the camera.</p>
                <p>➕ Click "Add Letter" to add the detected sign.</p>
                <p>🔤 Build your word letter by letter.</p>
            </div>

            <div class="controls">

                <button
                    onclick="addLetter()"
                    class="btn btn-success"
                >
                    Add Letter
                </button>

                <button
                    onclick="undoLetter()"
                    class="btn btn-warning"
                >
                    Undo
                </button>

                <button
                    onclick="resetWord()"
                    class="btn btn-danger"
                >
                    Reset
                </button>

                <button
                    onclick="speakWord()"
                    class="btn btn-info"
                >
                    Speak
                </button>

            </div>

        </div>

    </div>

    <canvas
        id="canvas"
        style="display:none;"
    ></canvas>

    <script>

        const video =
            document.getElementById('video');

        const canvas =
            document.getElementById('canvas');

        const currentLetter =
            document.getElementById('currentLetter');


        async function startCamera(){

            try{

                const stream =
                    await navigator.mediaDevices.getUserMedia({
                        video:true
                    });

                video.srcObject = stream;

            }catch(error){

                console.log(error);

                alert(
                    "Camera access denied"
                );
            }
        }


        async function predictFrame(){

            if(video.videoWidth === 0){
                return;
            }

            canvas.width = video.videoWidth;

            canvas.height = video.videoHeight;

            const ctx =
                canvas.getContext('2d');

            ctx.drawImage(
                video,
                0,
                0,
                canvas.width,
                canvas.height
            );

            const image =
                canvas.toDataURL('image/jpeg');

            const response =
                await fetch('/predict',{

                    method:'POST',

                    headers:{
                        'Content-Type':'application/json'
                    },

                    body:JSON.stringify({
                        image:image
                    })

                });

            const data =
                await response.json();

            if(data.success){

                currentLetter.textContent =
                    `${data.letter} (${Math.round(data.confidence * 100)}%)`;

                document.getElementById(
                    'displayWord'
                ).textContent = data.word;

            }
        }


        function updateWord(){

            fetch('/get_word')
                .then(res => res.json())
                .then(data => {

                    document.getElementById(
                        'displayWord'
                    ).textContent = data.word && data.word.trim()!==""? data.word:"No letters detectded yet.";

                });
        }


        function addLetter(){

            fetch('/add_letter',{
                method:'POST'
            }).then(updateWord);
        }


        function undoLetter(){

            fetch('/undo_letter',{
                method:'POST'
            }).then(updateWord);
        }


        function resetWord(){

            fetch('/reset',{
                method:'POST'
            }).then(updateWord);
        }


        function speakWord(){

            fetch('/get_word')
                .then(res => res.json())
                .then(data => {

                    const msg =
                        new SpeechSynthesisUtterance(
                            data.word
                        );

                    window.speechSynthesis.speak(msg);

                });
        }


        document.addEventListener(
            'keydown',
            function(event){

                const key =
                    event.key.toLowerCase();

                if(key === 'a') addLetter();

                if(key === 'u') undoLetter();

                if(key === 'r') resetWord();

                if(key === 's') speakWord();

            }
        );


        startCamera();

        setInterval(predictFrame, 700);

        setInterval(updateWord, 1000);

    </script>

</body>

</html>
